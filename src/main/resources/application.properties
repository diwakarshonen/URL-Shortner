spring.application.name=Url-Shortner

# Render PostgreSQL Database Configuration

server.port=9090
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hibernate JPA Configuration
spring.jpa.hibernate.ddl-auto=update

# Show SQL Queries in the Console (Optional)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

jwt.secret =${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:172800000}

frontend.url=https://ziplink-vwj8.onrender.comp

